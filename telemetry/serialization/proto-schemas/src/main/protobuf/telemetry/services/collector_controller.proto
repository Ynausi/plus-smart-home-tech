syntax = "proto3";

package ru.yandex.practicum.grpc.telemetry.collector;

option java_multiple_files = true;
option java_package = "ru.yandex.practicum.grpc.telemetry.collector";

import "google/protobuf/empty.proto";
import "telemetry/messages/sensor_event.proto";
import "telemetry/messages/hub_event.proto";

service CollectorController {
  rpc CollectSensorEvent (.ru.yandex.practicum.grpc.telemetry.event.SensorEventProto)
      returns (google.protobuf.Empty);
  rpc CollectHubEvent (.ru.yandex.practicum.grpc.telemetry.event.HubEventProto)
      returns (google.protobuf.Empty);
}